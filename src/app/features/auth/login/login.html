<nb-layout>
  <nb-layout-column>
    <nb-card>
      <nb-card-header>
        <h2>Login</h2>
      </nb-card-header>

      <nb-card-body>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

          <div class="form-group">
         <label>Email</label>
            <input nbInput formControlName="email" type="email" placeholder="Email">
          </div>

          <div class="form-group">
            <label>Password</label>
            <input nbInput formControlName="password" type="password" placeholder="Password">
          </div>

          <div class="form-group">
            <nb-checkbox formControlName="remember">Remember me</nb-checkbox>
          </div>

          <button nbButton type="submit" [disabled]="loginForm.invalid || loading" status="primary">
            @if (!loading) {
              <span>Login</span>
            }
            @if (loading) {
              <nb-spinner size="small"></nb-spinner>
            }
          </button>

        </form>
      </nb-card-body>
    </nb-card>
  </nb-layout-column>
</nb-layout>
